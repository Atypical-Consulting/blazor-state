name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mvvm-todo (BlazorMvvmApp)
            solution: samples/mvvm-todo/BlazorMvvmApp.sln
            has_tests: false
          - name: mvu (BlazorMVU)
            solution: libs/mvu/BlazorMVU.sln
            has_tests: true
          - name: mutty (Mutty)
            solution: utils/mutty/Mutty.sln
            has_tests: true
          - name: ducky (Ducky)
            solution: libs/ducky/Ducky.sln
            has_tests: true
          - name: bustand (Bustand)
            solution: libs/bustand/Bustand.sln
            has_tests: true
          - name: the-blazor-state (TheBlazorState)
            solution: libs/the-blazor-state/TheBlazorState.slnx
            has_tests: true
          - name: reactive-patterns (Reactif)
            solution: samples/reactive-patterns/Reactif.sln
            has_tests: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore workloads
        run: dotnet workload restore "${{ matrix.solution }}"

      - name: Restore
        run: dotnet restore "${{ matrix.solution }}"

      - name: Build
        run: dotnet build "${{ matrix.solution }}" -c Release --no-restore

      - name: Test
        if: matrix.has_tests == true
        run: dotnet test "${{ matrix.solution }}" -c Release --no-build
