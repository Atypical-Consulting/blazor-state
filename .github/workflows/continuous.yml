name: continuous

on:
  push:
    branches:
      - main
      - develop
      - 'releases/**'
  pull_request:
    branches:
      - 'releases/**'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  ubuntu-latest:
    name: ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: 'Cache: .nuke/temp, ~/.nuget/packages'
        uses: actions/cache@v5
        with:
          path: |
            .nuke/temp
            ~/.nuget/packages
          key: ${{ runner.os }}-${{ hashFiles('**/global.json', '**/*.csproj', '**/Directory.Packages.props') }}
      - name: Setup .NET 9 runtime
        run: |
          # Install .NET 9 runtime to NUKE's dotnet location after it's been set up
          DOTNET_INSTALL_DIR=".nuke/temp/dotnet-unix"
          mkdir -p "$DOTNET_INSTALL_DIR"
          curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --runtime dotnet --channel 9.0 --install-dir "$DOTNET_INSTALL_DIR"
      - name: 'Run: Pack'
        run: ./build.cmd Pack
        env:
          NuGetApiKey: ${{ secrets.NUGET_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: 'Publish: .artifacts'
        uses: actions/upload-artifact@v4
        with:
          name: .artifacts
          path: .artifacts
